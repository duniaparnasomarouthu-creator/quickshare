<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f6ff;
            text-align: center;
            padding: 40px;
        }

        .img-box {
            display: inline-block;
            margin: 10px;
        }

        img {
            width: 200px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        a {
            display: block;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Uploaded Images 📸</h1>

{% for img in images %}
    <div class="img-box">
        <img src="{{ url_for('static', filename=img) }}">
    </div>
{% endfor %}

<br>

<a href="/">⬅ Back to Upload</a>

</body>
</html>
