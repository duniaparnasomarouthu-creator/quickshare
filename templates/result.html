<!DOCTYPE html>
<html>
<head>
    <title>Upload Result</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f6ff;
            text-align: center;
            padding: 60px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #27ae60;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Upload Successful 🎉</h1>

    <p>Your file has been uploaded successfully.</p>

    <a href="/">Upload Another</a>
</div>

</body>
</html>
