<!DOCTYPE html>
<html>
<head>
    <title>Image Uploaded</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin-top: 100px;
            color: white;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }
    </style>

    <script>
        function copyLink() {
            var copyText = document.getElementById("link");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Link copied!");
        }
    </script>
</head>

<body>

<div class="box">
    <h2>✅ Upload Successful</h2>
    <p>Copy and share your link</p>

    <input type="text" value="{{ link }}" id="link" readonly>

    <br>
    <button onclick="copyLink()">Copy Link</button>

    <br><br>

    <h3>Preview:</h3>
    <img src="/image/{{ filename }}" width="300">

    <br><br>
    <a href="/">⬅ Upload Another</a>
</div>

</body>
</html>
