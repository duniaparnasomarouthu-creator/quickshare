<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body style="background:#fafafa;font-family:Arial;">

<div style="width:300px;margin:100px auto;background:white;padding:20px;border:1px solid #ddd;text-align:center;">

<h2>Instagram Login 🔐</h2>

<form method="POST">
    <input name="username" placeholder="Username" style="width:100%;padding:10px;margin:5px;">
    <input type="password" name="password" placeholder="Password" style="width:100%;padding:10px;margin:5px;">
    <button style="width:100%;padding:10px;background:#3897f0;color:white;border:none;">Login</button>
</form>

<br>
<a href="/register">Create Account</a>

</div>

</body>
</html>
