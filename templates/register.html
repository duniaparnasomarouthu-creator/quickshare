<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>
<body style="background:#fafafa;font-family:Arial;">

<div style="width:300px;margin:100px auto;background:white;padding:20px;text-align:center;">

<h2>Register 🆕</h2>

<form method="POST">
    <input name="username" placeholder="Username" style="width:100%;padding:10px;margin:5px;">

    <button style="width:100%;padding:10px;background:green;color:white;">Register</button>
</form>

</div>

</body>
</html>
