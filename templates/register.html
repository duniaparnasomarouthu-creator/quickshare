<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>

<body style="font-family:Arial;background:#f2f2f2;text-align:center;">

<div style="background:white;width:300px;margin:50px auto;padding:20px;border-radius:10px;">

<h2>Create Account 🆕</h2>

<form method="POST">

<input name="username" placeholder="Username" required><br><br>

<input name="password" type="password" placeholder="Password" required><br><br>

<input name="email" placeholder="Email" required><br><br>

<select name="gender">
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
</select><br><br>

<input name="age" type="number" placeholder="Age" required><br><br>

<button style="padding:10px;background:green;color:white;">Register</button>

</form>

</div>

</body>
</html>
