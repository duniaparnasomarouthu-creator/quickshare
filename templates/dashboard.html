<!DOCTYPE html>
<html>
<head>
<style>
body {font-family:Arial; background:#f1f3f4;}
.card {background:white; padding:15px; margin:10px; border-radius:10px;}
.stars span {font-size:28px; cursor:pointer;}
</style>
</head>

<body>

<h2>☁ My Drive | {{ storage_mb }} MB used</h2>

<div class="card">
<form action="/create_folder" method="post">
<input name="folder" placeholder="New folder">
<button>Create</button>
</form>
</div>

<div class="card">
<form action="/upload" method="post" enctype="multipart/form-data">
<input name="message" placeholder="Message">
<input name="folder" placeholder="Folder">
<input type="file" name="file">
<button>Upload</button>
</form>
</div>

<div class="card">
<h3>Rate</h3>
<form id="ratingForm" action="/rate" method="post">
<input type="hidden" name="rating" id="ratingValue">
<div class="stars">
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>
</form>
</div>

{% for p in posts %}
<div class="card">
<p>{{ p[1] }} ({{ p[2] }})</p>
{% if p[0] %}
<img src="/static/uploads/{{ p[0] }}" width="150">
{% endif %}
</div>
{% endfor %}

<script>
function rate(v){
document.getElementById("ratingValue").value=v;
document.getElementById("ratingForm").submit();
}
</script>

</body>
</html>
