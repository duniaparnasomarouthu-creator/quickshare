<!DOCTYPE html>
<html>
<head>
<style>
body {font-family:Segoe UI;margin:0;background:#f1f3f4;}
.header {background:#202124;color:white;padding:15px;display:flex;justify-content:space-between;}
.container {display:flex;}
.sidebar {width:220px;background:white;height:100vh;padding:15px;}
.main {flex:1;padding:20px;}
.card {background:white;padding:15px;border-radius:10px;margin-bottom:15px;}
.file {display:flex;justify-content:space-between;margin:5px;}
.dark {background:#121212;color:white;}
</style>
</head>

<body id="body">

<div class="header">
<h2>QuickShare</h2>
<div>
<button onclick="toggleDark()">🌙</button>
<a href="/logout" style="color:white;">Logout</a>
</div>
</div>

<div class="container">

<div class="sidebar">
<h3>Folders</h3>
<div onclick="go('root')">📁 Root</div>

{% for f in folders %}
<div onclick="go('{{f[0]}}')">📁 {{f[0]}}</div>
{% endfor %}

<form action="/create_folder" method="post">
<input name="folder">
<button>Create</button>
</form>
</div>

<div class="main">

<div class="card">
<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file">
<input type="hidden" name="folder" value="{{current_folder}}">
<button>Upload</button>
</form>
</div>

<div class="card">
<h3>Files</h3>

{% for p in posts %}
<div class="file">

<span>{{ get_icon(p[1]) }} {{p[1]}}</span>

<span>
<a href="{{p[0]}}" target="_blank">Open</a>

<button onclick="copyLink('{{p[0]}}')">Share</button>

<form action="/delete" method="post" style="display:inline;">
<input name="url" value="{{p[0]}}" hidden>
<button>Delete</button>
</form>

<form action="/rename" method="post" style="display:inline;">
<input name="old" value="{{p[1]}}" hidden>
<input name="new" placeholder="Rename">
<button>Rename</button>
</form>
</span>

</div>

{% if p[0].endswith('.jpg') or p[0].endswith('.png') %}
<img src="{{p[0]}}" width="150">
{% elif p[0].endswith('.pdf') %}
<iframe src="{{p[0]}}" width="200" height="150"></iframe>
{% endif %}

{% endfor %}
</div>

</div>
</div>

<script>
function go(f){ window.location="/dashboard?folder="+f; }
function toggleDark(){ document.body.classList.toggle("dark"); }
function copyLink(link){
    navigator.clipboard.writeText(link);
    alert("Link copied!");
}
</script>

</body>
</html>
