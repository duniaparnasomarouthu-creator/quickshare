<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#f1f3f4;
}

.header {
    background:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.container { display:flex; }

.sidebar {
    width:240px;
    background:white;
    height:100vh;
    padding:20px;
}

.sidebar a {
    display:block;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
    color:black;
}

.sidebar a.active {
    background:#e8f0fe;
    font-weight:bold;
}

.main {
    flex:1;
    padding:20px;
}

.files {
    display:grid;
    grid-template-columns:repeat(auto-fill, 180px);
    gap:15px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:6px;
}

button {
    background:#4285f4;
    color:white;
    border:none;
    padding:6px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
    ☁ My Drive
    <a href="/logout">Logout</a>
</div>

<div class="container">

<div class="sidebar">

<h3>Folders</h3>

<form action="/create_folder" method="post">
<input name="folder">
<button>Create</button>
</form>

<br>

<a href="/dashboard?folder=root" class="{% if current_folder=='root' %}active{% endif %}">
📁 Root
</a>

{% for f in folders %}
<a href="/dashboard?folder={{f[0]}}" class="{% if current_folder==f[0] %}active{% endif %}">
📁 {{f[0]}}
</a>
{% endfor %}

</div>

<div class="main">

<form action="/upload" method="post" enctype="multipart/form-data">
<input name="message" placeholder="Message">
<input type="hidden" name="folder" value="{{current_folder}}">
<input type="file" name="file">
<button>Upload</button>
</form>

<br>

<div class="files">
{% for p in posts %}
<div class="card">
{% if p[0] %}
<img src="/static/uploads/{{p[0]}}">
{% endif %}
<p>{{p[1]}}</p>
</div>
{% endfor %}
</div>

</div>

</div>

</body>
</html>
