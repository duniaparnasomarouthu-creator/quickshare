<!DOCTYPE html>
<html>
<head>
<style>
body {margin:0;font-family:Arial;background:#f1f3f4;}
.header {background:white;padding:15px;display:flex;justify-content:space-between;}
.container {display:flex;}
.sidebar {width:220px;background:white;padding:20px;}
.main {flex:1;padding:20px;}
.card {background:white;padding:10px;margin:10px;border-radius:10px;}
.files {display:grid;grid-template-columns:repeat(auto-fill,180px);gap:15px;}
.icon {font-size:50px;}
.dark {background:#111;color:white;}
.dark .card {background:#333;}
</style>
</head>

<body id="body">

<div class="header">
☁ My Drive ({{ storage }} MB)
<div>
<input placeholder="Search" onkeypress="if(event.key==='Enter')search(this.value)">
<a href="/logout">Logout</a>
<button onclick="dark()">🌙</button>
</div>
</div>

<div class="container">

<div class="sidebar">
<h3>Folders</h3>

<form action="/create_folder" method="post">
<input name="folder">
<button>Create</button>
</form>

<ul>
{% for f in folders %}
<li>
<a href="/folder/{{f[0]}}">{{f[0]}}</a>
<a href="/delete_folder/{{f[0]}}">❌</a>

<form action="/rename_folder" method="post">
<input type="hidden" name="old" value="{{f[0]}}">
<input name="new" placeholder="rename">
</form>

</li>
{% endfor %}
</ul>
</div>

<div class="main">

<form action="/upload" method="post" enctype="multipart/form-data">
<input name="message">
<input name="folder">
<input type="file" name="file">
<button>Upload</button>
</form>

<br>

<div>
⭐ <span onclick="rate(1)">1</span>
⭐ <span onclick="rate(2)">2</span>
⭐ <span onclick="rate(3)">3</span>
⭐ <span onclick="rate(4)">4</span>
⭐ <span onclick="rate(5)">5</span>
</div>

<form id="rateForm" action="/rate" method="post">
<input type="hidden" name="rating" id="rating">
</form>

<div class="files">
{% for p in posts %}
<div class="card">

{% if '.jpg' in p[0] or '.png' in p[0] %}
<img src="/static/uploads/{{p[0]}}" width="100%">
{% elif '.pdf' in p[0] %}
<div class="icon">📄</div>
{% else %}
<div class="icon">📁</div>
{% endif %}

<p>{{p[1]}}</p>
<small>{{p[2]}}</small>

</div>
{% endfor %}
</div>

</div>
</div>

<script>
function rate(v){
document.getElementById("rating").value=v;
document.getElementById("rateForm").submit();
}
function search(q){
window.location="/search?q="+q;
}
function dark(){
document.getElementById("body").classList.toggle("dark");
}
</script>

</body>
</html>
