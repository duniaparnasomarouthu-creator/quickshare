<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h1>My Feed 📸</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="text" name="message" placeholder="Write message" required><br><br>
<input type="file" name="file" required><br><br>

<button>Post</button>

</form>

<hr>

<h3>⭐ Rate Us</h3>

<form action="/rate" method="POST">
<select name="rating">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>
<button>Submit</button>
</form>

<hr>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">

{% for post in posts %}
<div style="border:1px solid #ccc;padding:10px;">

<p>{{ post[1] }}</p>

<img src="{{ url_for('static', filename='uploads/' + post[0]) }}" width="200">

<br>
<a href="/download/{{ post[0] }}">Download</a>

</div>
{% endfor %}

</div>

<br>
<a href="/admin">Go to Admin Panel</a>

</body>
</html>
