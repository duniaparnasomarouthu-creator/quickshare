<!DOCTYPE html>
<html>
<head>
    <title>My Feed</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        .topbar {
            background: #1877f2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            background: #1877f2;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0f5bd3;
        }

        .post {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .logout {
            float: right;
            color: white;
            text-decoration: none;
        }

        img {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="topbar">
    My Feed 📸
    <a class="logout" href="/logout">Logout</a>
</div>

<div class="container">

    <!-- POST BOX -->
    <div class="card">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <textarea name="message" placeholder="Write message..."></textarea>
            <input type="file" name="file">
            <button type="submit">Post</button>
        </form>
    </div>

    <!-- POSTS -->
    {% for p in posts %}
    <div class="card post">
        <p>{{ p[1] }}</p>
        <img src="/static/uploads/{{ p[0] }}">
    </div>
    {% endfor %}

    <!-- RATE -->
    <div class="card">
        <form action="/rate" method="post">
            <h3>⭐ Rate Us</h3>
            <input type="number" name="rating" min="1" max="5">
            <button type="submit">Submit</button>
        </form>
    </div>

</div>

</body>
</html>
