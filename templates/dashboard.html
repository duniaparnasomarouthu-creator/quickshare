<!DOCTYPE html>
<html>
<head>
    <title>My Feed</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        /* TOP BAR */
        .topbar {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        .logout {
            position: absolute;
            right: 20px;
            top: 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* MAIN CONTAINER */
        .container {
            width: 60%;
            margin: auto;
            margin-top: 20px;
        }

        /* GLASS CARD */
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        textarea {
            height: 70px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff512f, #dd2476);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* POST TEXT */
        .post-text {
            font-size: 16px;
            margin-bottom: 5px;
        }

    </style>
</head>

<body>

<div class="topbar">
    📸 My Feed
    <a class="logout" href="/logout">Logout</a>
</div>

<div class="container">

    <!-- POST BOX -->
    <div class="card">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <textarea name="message" placeholder="What's on your mind?"></textarea>
            <input type="file" name="file">
            <button type="submit">Post 🚀</button>
        </form>
    </div>

    <!-- POSTS -->
    {% for p in posts %}
    <div class="card">
        <div class="post-text">{{ p[1] }}</div>
        <img src="/static/uploads/{{ p[0] }}">
    </div>
    {% endfor %}

    <!-- RATE -->
    <div class="card">
        <form action="/rate" method="post">
            <h3>⭐ Rate Us</h3>
            <input type="number" name="rating" min="1" max="5">
            <button type="submit">Submit</button>
        </form>
    </div>

</div>

</body>
</html>
