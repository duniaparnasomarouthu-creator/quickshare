<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }

        .header {
            background: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        img {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="header">📸 My Feed</div>

<div class="container">

    <!-- POST -->
    <div class="card">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <textarea name="message" placeholder="Write something..."></textarea>
            <input type="file" name="file">
            <button type="submit">Post</button>
        </form>
    </div>

    <!-- POSTS -->
    {% for p in posts %}
    <div class="card">
        <p>{{ p[1] }}</p>

        {% if p[0] %}
            <img src="/static/uploads/{{ p[0] }}">
        {% endif %}
    </div>
    {% endfor %}

    <!-- RATE -->
    <div class="card">
        <form action="/rate" method="post">
            <h3>⭐ Rate Us</h3>
            <input type="number" name="rating" min="1" max="5">
            <button type="submit">Submit</button>
        </form>
    </div>

</div>

</body>
</html>
