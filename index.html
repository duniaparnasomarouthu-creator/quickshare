<!DOCTYPE html>
<html>
<head>
    <title>QuickShare</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin-top: 100px;
            color: white;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        input {
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>📤 QuickShare</h2>
        <p>Upload your image and get a shareable link</p>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="image" required><br>
            <button type="submit">Upload</button>
        </form>
    </div>

</body>
</html>
